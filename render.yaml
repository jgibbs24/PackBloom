services:
  - type: web
    name: mtg-pack-simulator-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/ready
    envVars:
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: packbloom-postgres
          property: connectionString

databases:
  - name: packbloom-postgres
    plan: free
