spring.application.name=mtg-pack-simulator
server.port=${PORT:8080}

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

scryfall.base-url=https://api.scryfall.com
scryfall.user-agent=MTGPackSimulator/0.1 (local-dev)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:packbloom;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
